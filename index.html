<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidhanLabs — AI for Indian Law</title>
<meta name="description" content="VidhanLabs builds AI-powered legal intelligence tools for Indian lawyers. Research faster, prepare stronger cases, uncover hidden insights.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #09090b;
  color: #fafafa;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated Gradient Background ──────────────────────────── */
.bg-glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-glow::before,
.bg-glow::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  animation: drift 20s ease-in-out infinite alternate;
}

.bg-glow::before {
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, #6366f1 0%, transparent 70%);
  top: -10%;
  left: 30%;
}

.bg-glow::after {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
  bottom: -5%;
  right: 20%;
  animation-delay: -10s;
  animation-direction: alternate-reverse;
}

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(60px, -40px) scale(1.1); }
  100% { transform: translate(-30px, 30px) scale(0.95); }
}

/* Subtle grain texture overlay */
.bg-noise {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* ── Layout ────────────────────────────────────────────────── */
.page {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem 1.5rem;
}

.hero {
  max-width: 720px;
  text-align: center;
}

/* ── Status Badge ──────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 1rem;
  border-radius: 9999px;
  border: 1px solid rgba(99, 102, 241, 0.25);
  background: rgba(99, 102, 241, 0.08);
  font-size: 0.8rem;
  font-weight: 500;
  color: #a5b4fc;
  letter-spacing: 0.03em;
  margin-bottom: 2.5rem;
  text-transform: uppercase;
}

.badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #818cf8;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.6); }
  50%      { opacity: 0.6; box-shadow: 0 0 0 6px rgba(129, 140, 248, 0); }
}

/* ── Typography ────────────────────────────────────────────── */
.brand {
  font-size: clamp(2.75rem, 6vw, 4.5rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 1.25rem;
  background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 500;
  color: #d4d4d8;
  line-height: 1.4;
  margin-bottom: 1.75rem;
}

.description {
  font-size: clamp(0.95rem, 1.8vw, 1.125rem);
  color: #71717a;
  line-height: 1.75;
  max-width: 560px;
  margin: 0 auto 3rem;
}

/* ── Divider ───────────────────────────────────────────────── */
.divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #3f3f46, transparent);
  margin: 0 auto 2rem;
}

/* ── Contact Link ──────────────────────────────────────────── */
.contact {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.95rem;
  color: #a1a1aa;
  text-decoration: none;
  padding: 0.6rem 1.5rem;
  border-radius: 9999px;
  border: 1px solid #27272a;
  background: rgba(255, 255, 255, 0.02);
  transition: all 0.3s ease;
}

.contact:hover {
  color: #fafafa;
  border-color: #6366f1;
  background: rgba(99, 102, 241, 0.08);
  box-shadow: 0 0 24px rgba(99, 102, 241, 0.1);
}

.contact-icon {
  width: 16px;
  height: 16px;
  opacity: 0.6;
  transition: opacity 0.3s ease;
}

.contact:hover .contact-icon { opacity: 1; }

/* ── Footer ────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 2rem 1.5rem;
  font-size: 0.8rem;
  color: #3f3f46;
  letter-spacing: 0.02em;
}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 640px) {
  main { padding: 3rem 1.25rem; }
  .badge { margin-bottom: 2rem; }
  .description { margin-bottom: 2.25rem; }
}

@media (min-width: 1200px) {
  .bg-glow::before { width: 800px; height: 800px; }
  .bg-glow::after  { width: 700px; height: 700px; }
}

/* ── Fade-in animation on load ─────────────────────────────── */
.fade-in {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.8s ease forwards;
}

.fade-in:nth-child(2) { animation-delay: 0.1s; }
.fade-in:nth-child(3) { animation-delay: 0.2s; }
.fade-in:nth-child(4) { animation-delay: 0.3s; }
.fade-in:nth-child(5) { animation-delay: 0.4s; }
.fade-in:nth-child(6) { animation-delay: 0.5s; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<!-- Ambient background glow -->
<div class="bg-glow" aria-hidden="true"></div>
<div class="bg-noise" aria-hidden="true"></div>

<div class="page">
  <main>
    <section class="hero">

      <div class="badge fade-in">
        <span class="badge-dot"></span>
        Currently in Development
      </div>

      <h1 class="brand fade-in">VidhanLabs</h1>

      <p class="tagline fade-in">Building the intelligence layer for Indian law.</p>

      <p class="description fade-in">
        AI-powered solutions designed to help lawyers research faster,
        prepare stronger cases, and uncover insights hidden in legal data.
      </p>

      <div class="divider fade-in" aria-hidden="true"></div>

      <a href="mailto:hello@vidhanlabs.com" class="contact fade-in">
        <!-- Inline SVG mail icon keeps the page dependency-free -->
        <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        hello@vidhanlabs.com
      </a>

    </section>
  </main>

  <footer>&copy; 2026 VidhanLabs</footer>
</div>

</body>
</html>
