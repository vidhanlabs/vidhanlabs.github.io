<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidhanLabs — AI for Indian Law</title>
<meta name="description" content="VidhanLabs builds AI-powered legal intelligence tools for Indian lawyers. Research faster, prepare stronger cases, uncover hidden insights.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0b0b0f;
  color: #fafafa;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated Gradient Background ──────────────────────────── */
.bg-glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-glow::before,
.bg-glow::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.18;
  animation: drift 20s ease-in-out infinite alternate;
}

.bg-glow::before {
  width: 650px;
  height: 650px;
  background: radial-gradient(circle, #6366f1 0%, transparent 70%);
  top: -15%;
  left: 25%;
}

.bg-glow::after {
  width: 550px;
  height: 550px;
  background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
  bottom: -5%;
  right: 15%;
  animation-delay: -10s;
  animation-direction: alternate-reverse;
}

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  50%  { transform: translate(60px, -40px) scale(1.1); }
  100% { transform: translate(-30px, 30px) scale(0.95); }
}

/* Subtle grain texture */
.bg-noise {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* ── Page Layout ───────────────────────────────────────────── */
.page {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Nav ───────────────────────────────────────────────────── */
nav {
  display: flex;
  justify-content: center;
  padding: 1.5rem 2rem;
}

.nav-wordmark {
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #71717a;
}

/* ── Hero ──────────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem 4rem;
}

.hero {
  max-width: 820px;
  text-align: center;
}

/* ── Logo Mark ─────────────────────────────────────────────── */
.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 80px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  margin-bottom: 2.5rem;
}

.logo-mark img {
  width: 48px;
  height: 48px;
}

/* ── Intro Label ───────────────────────────────────────────── */
.intro {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #a78bfa;
  margin-bottom: 1.5rem;
}

/* ── Brand Headline ────────────────────────────────────────── */
.brand {
  font-size: clamp(3.5rem, 10vw, 7rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 1.5rem;
  background: linear-gradient(180deg, #ffffff 30%, #52525b 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Tagline ───────────────────────────────────────────────── */
.tagline {
  font-size: clamp(1.25rem, 3vw, 1.75rem);
  font-weight: 400;
  color: #a1a1aa;
  line-height: 1.5;
  margin-bottom: 1rem;
}

.tagline strong {
  color: #e4e4e7;
  font-weight: 500;
}

/* ── Description ───────────────────────────────────────────── */
.description {
  font-size: clamp(1rem, 2vw, 1.125rem);
  font-weight: 300;
  color: #52525b;
  line-height: 1.8;
  max-width: 520px;
  margin: 0 auto 3.5rem;
}

/* ── CTA Button ────────────────────────────────────────────── */
.cta {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 500;
  color: #fff;
  text-decoration: none;
  padding: 0.85rem 2rem;
  border-radius: 9999px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
}

.cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
}

.cta:active {
  transform: translateY(0);
}

.cta-icon {
  width: 16px;
  height: 16px;
}

/* ── Status Indicator ───────────────────────────────────────── */
.status {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 2.25rem;
  padding: 0.5rem 1.25rem;
  border-radius: 9999px;
  border: 1px solid rgba(167, 139, 250, 0.2);
  background: rgba(167, 139, 250, 0.06);
  font-size: 0.85rem;
  font-weight: 500;
  color: #c4b5fd;
  letter-spacing: 0.03em;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #a78bfa;
  box-shadow: 0 0 10px rgba(167, 139, 250, 0.6);
  animation: status-pulse 2s ease-in-out infinite;
}

@keyframes status-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(167, 139, 250, 0.6); }
  50%      { opacity: 0.5; box-shadow: 0 0 4px rgba(167, 139, 250, 0.2); }
}

/* ── Footer ────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding: 2rem 1.5rem;
  font-size: 0.75rem;
  font-weight: 400;
  color: #27272a;
  letter-spacing: 0.02em;
  border-top: 1px solid rgba(255, 255, 255, 0.04);
}

/* ── Animations ────────────────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.reveal-d1 { animation-delay: 0.1s; }
.reveal-d2 { animation-delay: 0.25s; }
.reveal-d3 { animation-delay: 0.4s; }
.reveal-d4 { animation-delay: 0.55s; }
.reveal-d5 { animation-delay: 0.7s; }
.reveal-d6 { animation-delay: 0.85s; }
.reveal-d7 { animation-delay: 1.0s; }

@keyframes rise {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 640px) {
  main { padding: 1.5rem 1.25rem 3rem; }
  .logo-mark { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 2rem; }
  .logo-mark img { width: 38px; height: 38px; }
  .intro { margin-bottom: 1rem; }
  .description { margin-bottom: 2.5rem; }
}

@media (min-width: 1200px) {
  .bg-glow::before { width: 850px; height: 850px; }
  .bg-glow::after  { width: 750px; height: 750px; }
}
</style>
</head>

<body>

<div class="bg-glow" aria-hidden="true"></div>
<div class="bg-noise" aria-hidden="true"></div>

<div class="page">

  <nav>
    <span class="nav-wordmark">VidhanLabs</span>
  </nav>

  <main>
    <section class="hero">
      <p class="intro reveal reveal-d2">Introducing</p>

      <h1 class="brand reveal reveal-d3">VidhanLabs</h1>

      <p class="tagline reveal reveal-d4">
        The <strong>intelligence layer</strong> for Indian law.
      </p>

      <p class="description reveal reveal-d5">
        AI-powered tools that help lawyers research faster,
        prepare stronger cases, and uncover insights
        hidden in millions of legal documents.
      </p>

      <div class="reveal reveal-d6">
        <a href="mailto:hello@vidhanlabs.com" class="cta">
          <svg class="cta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          Get in Touch
        </a>
      </div>

      <p class="status reveal reveal-d7">
        <span class="status-dot" aria-hidden="true"></span>
        Currently in development
      </p>

    </section>
  </main>

  <footer>&copy; 2026 VidhanLabs. All rights reserved.</footer>

</div>

</body>
</html>
